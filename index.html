<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeVision Pro - Felix</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.cdnfonts.com/css/impact" rel="stylesheet">
    <style>
        .font-impact { font-family: 'Impact', sans-serif; }
        body { background-color: #050505; color: white; }
        .goog-te-gadget-simple { background: transparent !important; border: none !important; }
        .goog-te-gadget-icon { display: none !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [idioma, setIdioma] = useState(localStorage.getItem('meme_lang') || 'Brasil');
            const [tema, setTema] = useState('');
            const [image, setImage] = useState(null);
            const [imageBase64, setImageBase64] = useState('');
            const [isUnobstructed, setIsUnobstructed] = useState(true);
            const [memeTexts, setMemeTexts] = useState({ top: '', bottom: '' });
            const [loading, setLoading] = useState(false);
            const [showResult, setShowResult] = useState(false);
            const [error, setError] = useState(null);

            useEffect(() => {
                localStorage.setItem('gemini_api_key', apiKey);
                localStorage.setItem('meme_lang', idioma);
            }, [apiKey, idioma]);

            const handleImage = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        setImage(ev.target.result);
                        setImageBase64(ev.target.result.split(',')[1]);
                        setShowResult(false);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const gerarMeme = async () => {
                if (!apiKey) return setError("Falta a API Key!");
                setLoading(true);
                setError(null);

                try {
                    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: `SISTEMA: Criador de Memes. GÍRIAS: ${idioma}. TEMA: ${tema}. FORMATO: Texto Cima | Texto Baixo. Sem explicações.` },
                                    { inline_data: { mime_type: "image/jpeg", data: imageBase64 } }
                                ]
                            }]
                        })
                    });

                    const data = await resp.json();
                    const txt = data.candidates[0].content.parts[0].text;
                    const [top, bottom] = txt.split('|');
                    setMemeTexts({ top: top?.trim(), bottom: bottom?.trim() });
                    setShowResult(true);
                } catch (err) {
                    setError("Erro na conexão com a IA.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-md mx-auto p-6 space-y-6">
                    <header className="flex justify-between items-center py-4">
                        <h1 className="text-2xl font-black italic text-blue-500">MEMEVISION PRO</h1>
                        <div id="google_translate_element"></div>
                    </header>

                    <div className="bg-zinc-900 p-6 rounded-[2rem] border border-zinc-800 space-y-4 shadow-2xl">
                        <input 
                            type="password" 
                            placeholder="API KEY DO GEMINI" 
                            className="w-full bg-zinc-800 p-4 rounded-xl text-sm outline-none border border-transparent focus:border-blue-500"
                            value={apiKey}
                            onChange={e => setApiKey(e.target.value)}
                        />
                        
                        <div className="flex gap-2">
                            <input placeholder="Gírias (Ex: RJ)" className="w-1/2 bg-zinc-800 p-4 rounded-xl text-sm" value={idioma} onChange={e => setIdioma(e.target.value)} />
                            <input placeholder="Tema" className="w-1/2 bg-zinc-800 p-4 rounded-xl text-sm" value={tema} onChange={e => setTema(e.target.value)} />
                        </div>

                        {!image ? (
                            <label className="flex flex-col items-center justify-center h-48 border-2 border-dashed border-zinc-700 rounded-2xl cursor-pointer hover:bg-zinc-800 transition-colors">
                                <span className="text-xs font-bold text-zinc-500 uppercase">Carregar Foto</span>
                                <input type="file" className="hidden" onChange={handleImage} />
                            </label>
                        ) : (
                            <div className="relative">
                                <img src={image} className="w-full h-48 object-cover rounded-2xl" />
                                <button onClick={() => setImage(null)} className="absolute top-2 right-2 bg-red-500 p-2 rounded-full text-white">X</button>
                            </div>
                        )}

                        <div className="flex items-center justify-between p-4 bg-zinc-800/50 rounded-xl">
                            <span className="text-[10px] font-bold uppercase text-zinc-400 italic">Legenda Clássica</span>
                            <button 
                                onClick={() => setIsUnobstructed(!isUnobstructed)}
                                className={`w-10 h-6 rounded-full relative transition-colors ${isUnobstructed ? 'bg-blue-600' : 'bg-zinc-600'}`}
                            >
                                <div className={`w-4 h-4 bg-white rounded-full absolute top-1 transition-all ${isUnobstructed ? 'left-5' : 'left-1'}`} />
                            </button>
                        </div>

                        <button 
                            onClick={gerarMeme}
                            disabled={loading || !image}
                            className="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase italic hover:bg-blue-700 active:scale-95 transition-all disabled:opacity-50"
                        >
                            {loading ? "A processar..." : "GERAR MEME COM IA"}
                        </button>
                    </div>

                    {showResult && (
                        <div className="space-y-4 animate-in fade-in slide-in-from-bottom-4">
                            <div className="bg-black rounded-[2rem] overflow-hidden border-4 border-zinc-900 shadow-2xl">
                                {isUnobstructed && <div className="p-4 text-center font-impact text-2xl uppercase">{memeTexts.top}</div>}
                                <div className="relative">
                                    <img src={image} className="w-full" />
                                    {!isUnobstructed && (
                                        <>
                                            <div className="absolute top-4 w-full text-center font-impact text-3xl uppercase text-white [text-shadow:2px_2px_0_#000,-2px_-2px_0_#000]">{memeTexts.top}</div>
                                            <div className="absolute bottom-4 w-full text-center font-impact text-3xl uppercase text-white [text-shadow:2px_2px_0_#000,-2px_-2px_0_#000]">{memeTexts.bottom}</div>
                                        </>
                                    )}
                                </div>
                                {isUnobstructed && <div className="p-4 text-center font-impact text-2xl uppercase">{memeTexts.bottom}</div>}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'pt'}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
