<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>MemeVision IA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3553/3553655.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: sans-serif; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; background: #1a1a1a; padding: 20px; border-radius: 24px; border: 1px solid #333; }
        h1 { text-align: center; margin-bottom: 20px; color: #007bff; font-size: 1.6rem; }
        .box { background: #222; padding: 15px; border-radius: 14px; margin-bottom: 12px; }
        .row { display: flex; gap: 10px; margin-bottom: 12px; }
        .flex-1 { flex: 1; }
        label { font-size: 9px; color: #aaa; display: block; margin-bottom: 4px; text-transform: uppercase; font-weight: bold; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #3d3d3d; background: #0c0c0c; color: #fff; outline: none; }
        
        #uploadArea { width: 100%; height: 100px; border: 2px dashed #444; display: flex; align-items: center; justify-content: center; border-radius: 16px; background: #111; margin-bottom: 15px; cursor: pointer; }
        .btn-gerar { width: 100%; padding: 18px; background: #007bff; color: white; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; display: none; }
        
        #statusArea { display: none; margin-top: 10px; font-size: 13px; background: #00152e; padding: 12px; border-radius: 10px; border-left: 4px solid #007bff; }
        #resultArea { display: none; margin-top: 20px; }
        .meme-card { position: relative; width: 100%; background: #000; border-radius: 12px; overflow: hidden; border: 2px solid #333; line-height: 0; }
        #imgMeme { width: 100%; height: auto; display: block; }
        
        .meme-text { 
            position: absolute; width: 100%; left: 0; text-align: center; color: white; 
            font-family: 'Anton', sans-serif; font-size: 2.2rem; text-transform: uppercase; 
            padding: 10px; pointer-events: none; -webkit-text-stroke: 1.8px black;
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000; z-index: 10;
        }
        .top { top: 5px; } .bottom { bottom: 10px; }
        .btn-save { width: 100%; padding: 16px; background: #28a745; color: white; border: none; border-radius: 14px; margin-top: 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎭 MemeVision v4.4</h1>
    <div class="box"><label>Chave API:</label><input type="password" id="apiKey"></div>
    <div class="row">
        <div class="flex-1"><label>Gírias (País):</label><input type="text" id="idioma" value="Brasil"></div>
        <div class="flex-1"><label>Assunto:</label><input type="text" id="tema"></div>
    </div>
    <div id="uploadArea" onclick="document.getElementById('fileInput').click()">🖼️ Toque para Foto</div>
    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="document.getElementById('btnGerar').style.display='block'">
    <button id="btnGerar" class="btn-gerar" onclick="iniciarFluxo()">🚀 CRIAR MEME</button>
    <div id="statusArea"><p id="currentAction">Aguardando...</p></div>
    <div id="resultArea">
        <div class="meme-card" id="memeExport">
            <img id="imgMeme">
            <div id="tTop" class="meme-text top"></div>
            <div id="tBottom" class="meme-text bottom"></div>
        </div>
        <button class="btn-save" onclick="baixar()">💾 SALVAR MEME</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
    // Registro do Service Worker para PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => console.log("PWA Ativo!"));
    }

    // [O RESTO DO SEU CÓDIGO JS DE LISTAR MODELOS E GERAR CONTEÚDO CONTINUA AQUI]
    // (A mesma lógica de fluxo que construímos anteriormente)
</script>
</body>
</html>
