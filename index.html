<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MemeVision IA - v4.3</title>
    <style>
        /* Importando uma fonte impact-like caso o sistema não tenha */
        @import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 15px; }
        
        .container { max-width: 500px; margin: 0 auto; background: #1a1a1a; padding: 20px; border-radius: 24px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        h1 { text-align: center; margin-bottom: 20px; color: #007bff; font-size: 1.6rem; letter-spacing: -1px; }
        .box { background: #222; padding: 15px; border-radius: 14px; margin-bottom: 12px; border: 1px solid #2a2a2a; }
        .row { display: flex; gap: 10px; margin-bottom: 12px; }
        .flex-1 { flex: 1; }
        
        label { font-size: 9px; color: #aaa; display: block; margin-bottom: 4px; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #3d3d3d; background: #0c0c0c; color: #fff; outline: none; font-size: 14px; transition: 0.2s; }
        input:focus { border-color: #007bff; background: #111; }

        #uploadArea { 
            width: 100%; height: 100px; border: 2px dashed #444; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border-radius: 16px; cursor: pointer; background: #111; margin-bottom: 15px;
            transition: 0.3s;
        }
        #uploadArea:hover { border-color: #007bff; background: #151515; }

        .btn-gerar { 
            width: 100%; padding: 18px; background: #007bff; color: white; 
            border: none; border-radius: 14px; font-weight: 800; font-size: 1rem;
            cursor: pointer; display: none; text-transform: uppercase;
        }

        #statusArea { display: none; margin-top: 10px; font-size: 13px; background: #00152e; padding: 12px; border-radius: 10px; border-left: 4px solid #007bff; }
        .scanning { color: #007bff; font-weight: bold; }

        /* ESTILO DO MEME - AQUI ESTÁ A MUDANÇA DA FONTE */
        #resultArea { display: none; margin-top: 20px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .meme-card { position: relative; width: 100%; background: #000; border-radius: 12px; overflow: hidden; border: 2px solid #333; line-height: 0; }
        #imgMeme { width: 100%; height: auto; display: block; }
        
        .meme-text { 
            position: absolute; width: 100%; left: 0; text-align: center;
            color: white; 
            /* Fonte Impact é a clássica. Anton é o fallback do Google Fonts */
            font-family: 'Anton', 'Impact', 'Arial Black', sans-serif; 
            font-size: 2.4rem;
            text-transform: uppercase; 
            padding: 10px 15px; 
            pointer-events: none;
            line-height: 1;
            /* Stroke (Contorno) mais forte */
            -webkit-text-stroke: 1.8px black;
            paint-order: stroke fill;
            text-shadow: 
                3px 3px 0 #000,
                -1px -1px 0 #000,  
                 1px -1px 0 #000,
                -1px  1px 0 #000,
                 1px  1px 0 #000;
            z-index: 10;
        }
        .top { top: 5px; }
        .bottom { bottom: 10px; }

        .btn-save { width: 100%; padding: 16px; background: #28a745; color: white; border: none; border-radius: 14px; margin-top: 15px; font-weight: bold; font-size: 1rem; cursor: pointer; }
        
        @media (max-width: 450px) {
            .meme-text { font-size: 1.8rem; -webkit-text-stroke: 1.2px black; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎭 MemeVision Pro</h1>

    <div class="box">
        <label>Chave da API:</label>
        <input type="password" id="apiKey" placeholder="Cole sua Gemini Key...">
    </div>

    <div class="row">
        <div class="flex-1">
            <label>Gírias (País/Idioma):</label>
            <input type="text" id="idioma" placeholder="Ex: Brasil">
        </div>
        <div class="flex-1">
            <label>Assunto:</label>
            <input type="text" id="tema" placeholder="Ex: Games, Trabalho">
        </div>
    </div>

    <div id="uploadArea" onclick="document.getElementById('fileInput').click()">
        <span style="font-size: 1.8rem; margin-bottom: 5px;">🖼️</span>
        <p id="upText" style="font-size: 13px; font-weight: 500;">Toque para carregar imagem</p>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="preview(this.files[0])">
    </div>

    <button id="btnGerar" class="btn-gerar" onclick="iniciarFluxo()">🚀 CRIAR MEME</button>
    
    <div id="statusArea">
        <p id="currentAction" class="scanning">Aguardando...</p>
        <p id="currentModel" style="color: #66a3ff; font-size: 10px; margin-top: 4px; font-family: monospace;"></p>
    </div>

    <div id="resultArea">
        <div class="meme-card" id="memeExport">
            <img id="imgMeme">
            <div id="tTop" class="meme-text top"></div>
            <div id="tBottom" class="meme-text bottom"></div>
        </div>
        <button class="btn-save" onclick="baixar()">💾 SALVAR GALERIA</button>
        <button style="width:100%; background:none; border:none; color:#888; padding:12px; margin-top:5px; font-size: 13px; text-decoration: underline;" onclick="location.reload()">Tentar outra foto</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
    // Carregamento inicial
    document.getElementById('apiKey').value = localStorage.getItem('gemini_key') || "";
    document.getElementById('idioma').value = localStorage.getItem('meme_lang') || "Brasil";

    function preview(f) {
        if(!f) return;
        document.getElementById('upText').innerText = "✅ Imagem selecionada!";
        document.getElementById('btnGerar').style.display = 'block';
    }

    async function iniciarFluxo() {
        const key = document.getElementById('apiKey').value.trim();
        const file = document.getElementById('fileInput').files[0];
        const lang = document.getElementById('idioma').value.trim();
        const theme = document.getElementById('tema').value.trim();
        
        if(!key || !file) return alert("Erro: API Key ou Foto faltando.");
        localStorage.setItem('gemini_key', key);
        localStorage.setItem('meme_lang', lang);

        const statusArea = document.getElementById('statusArea');
        const actionTxt = document.getElementById('currentAction');
        const modelTxt = document.getElementById('currentModel');
        const btn = document.getElementById('btnGerar');

        btn.style.display = 'none';
        statusArea.style.display = 'block';
        document.getElementById('resultArea').style.display = 'none';

        try {
            actionTxt.innerText = "🔍 Localizando modelos ativos...";
            const listRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
            const listData = await listRes.json();
            
            if (!listRes.ok) throw new Error("API Key inválida.");

            let modelosPossiveis = listData.models
                .filter(m => m.supportedGenerationMethods.includes("generateContent"))
                .map(m => m.name);

            // Priorização inteligente
            const pOrder = ["2.0-flash", "2.5-flash", "1.5-flash", "flash-latest"];
            modelosPossiveis.sort((a, b) => {
                let sA = pOrder.findIndex(p => a.includes(p));
                let sB = pOrder.findIndex(p => b.includes(p));
                return (sA === -1 ? 99 : sA) - (sB === -1 ? 99 : sB);
            });

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                document.getElementById('imgMeme').src = reader.result;

                for (let model of modelosPossiveis) {
                    modelTxt.innerText = `MODELO ATUAL: ${model}`;
                    actionTxt.innerText = "⏳ A IA está analisando e criando...";
                    
                    let prompt = `Analyze this image and create a short, hilarious meme.
                    LOCAL CONTEXT/SLANG: ${lang}. 
                    THEME: ${theme || 'General'}.
                    MANDATORY FORMAT: TOP TEXT | BOTTOM TEXT.
                    RULES: Return ONLY the meme text. No explanations, no "Top Text:", no hashtags. Use local slang naturally.`;

                    try {
                        const resMeme = await fetch(`https://generativelanguage.googleapis.com/v1beta/${model}:generateContent?key=${key}`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                contents: [{ parts: [
                                    { text: prompt },
                                    { inline_data: { mime_type: "image/jpeg", data: base64 } }
                                ]}]
                            })
                        });

                        const data = await resMeme.json();
                        if (resMeme.ok && data.candidates) {
                            let text = data.candidates[0].content.parts[0].text;
                            
                            // Limpeza rigorosa
                            text = text.replace(/TOP|BOTTOM|TEXT|CIMA|BAIXO|MEME|:|#|\*/gi, "").trim();
                            const partes = text.split('|');
                            
                            document.getElementById('tTop').innerText = partes[0] ? partes[0].trim() : "";
                            document.getElementById('tBottom').innerText = partes[1] ? partes[1].trim() : "";
                            
                            statusArea.style.display = 'none';
                            document.getElementById('resultArea').style.display = 'block';
                            return; 
                        }
                    } catch (e) {}
                }
                throw new Error("Cota esgotada. Tente novamente em 60 segundos.");
            };
        } catch (e) {
            actionTxt.innerText = "❌ " + e.message;
            btn.style.display = 'block';
        }
    }

    async function baixar() {
        // html2canvas captura o que está na tela
        const c = await html2canvas(document.getElementById('memeExport'), { 
            scale: 3, // Alta qualidade
            useCORS: true,
            backgroundColor: null
        });
        const l = document.createElement('a');
        l.download = `MemeVision_${Date.now()}.png`;
        l.href = c.toDataURL("image/png");
        l.click();
    }
</script>
</body>
</html>
