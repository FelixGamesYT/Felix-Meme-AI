<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeVision IA</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🎭 MemeVision IA</h1>

        <div class="custom-settings">
            <input type="text" id="customTheme" placeholder="Tema (Ex: Minecraft, Futebol, Escola)">
            <input type="text" id="customLang" placeholder="Idioma" value="Português">
        </div>

        <div class="theme-selector">
            <button class="theme-btn active" data-theme="engraçado">😂 Engraçado</button>
            <button class="theme-btn" data-theme="sarcástico">🙄 Sarcástico</button>
            <button class="theme-btn" data-theme="nerd">🤓 Nerd</button>
            <button class="theme-btn" data-theme="atrevido">😏 Atrevido</button>
        </div>

        <div id="uploadArea" class="upload-box">
            <p>📸 Toque para carregar foto</p>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
        </div>

        <div id="loadingArea" style="display: none;">
            <div class="spinner"></div>
            <p>Buscando modelo e analisando...</p>
        </div>
