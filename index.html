<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>MemeVision AI Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.cdnfonts.com/css/impact" rel="stylesheet">
    <style>
        .font-impact { font-family: 'Impact', sans-serif; }
        body { background-color: #050505; color: white; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        input::placeholder { color: #3f3f46; }
        /* Garante um espaçamento quando o scroll automático acontece */
        .meme-container { scroll-margin-top: 2rem; }
        .neon-border { border: 1px solid rgba(59, 130, 246, 0.3); box-shadow: 0 0 20px rgba(59, 130, 246, 0.05); }
        .glass-panel { background: rgba(24, 24, 27, 0.7); backdrop-filter: blur(20px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const _SECRET_ENC = "QUl6YVN5QVdBdEtUeXU0MDQ1QkxjdmdfS1d5MUQ0VzJpU0xWSXYw"; 
        const getMasterKey = () => atob(_SECRET_ENC);

        function App() {
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [idioma, setIdioma] = useState(localStorage.getItem('meme_lang') || 'Brasil');
            const [tema, setTema] = useState('');
            const [image, setImage] = useState(null);
            const [imageBase64, setImageBase64] = useState('');
            const [isUnobstructed, setIsUnobstructed] = useState(true);
            const [memeTexts, setMemeTexts] = useState({ top: '', bottom: '' });
            const [loading, setLoading] = useState(false);
            const [showResult, setShowResult] = useState(false);
            const [error, setError] = useState(null);
            const [showSettings, setShowSettings] = useState(false);
            
            const resultRef = useRef(null);
            const memeRef = useRef(null);

            useEffect(() => {
                localStorage.setItem('gemini_api_key', apiKey);
                localStorage.setItem('meme_lang', idioma);
            }, [apiKey, idioma]);

            // Efeito para rolar a página sempre que o showResult mudar para true
            useEffect(() => {
                if (showResult && resultRef.current) {
                    // Pequeno delay para garantir que o elemento já está renderizado e visível
                    setTimeout(() => {
                        resultRef.current.scrollIntoView({ 
                            behavior: 'smooth', 
                            block: 'start' 
                        });
                    }, 150);
                }
            }, [showResult]);

            const fetchModels = async (key) => {
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                    const data = await res.json();
                    if (data.models) {
                        return data.models
                            .filter(m => m.supportedGenerationMethods.includes('generateContent'))
                            .map(m => m.name.replace('models/', ''))
                            .reverse();
                    }
                } catch (e) { console.error(e); }
                return ["gemini-2.5-flash-preview-09-2025", "gemini-1.5-flash"];
            };

            const speak = (text1, text2) => {
                const utterance = new SpeechSynthesisUtterance(`${text1}. ${text2}`);
                utterance.lang = idioma.toLowerCase().includes('portugal') ? 'pt-PT' : 'pt-BR';
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
            };

            const downloadMeme = async () => {
                if (!memeRef.current) return;
                try {
                    const canvas = await html2canvas(memeRef.current, {
                        useCORS: true,
                        scale: 2,
                        backgroundColor: '#000'
                    });
                    const link = document.createElement('a');
                    link.download = `MemeVision_${Date.now()}.png`;
                    link.href = canvas.toDataURL("image/png");
                    link.click();
                } catch (err) {
                    setError("Erro ao baixar o meme. Tenta novamente.");
                }
            };

            const gerarMeme = async () => {
                const finalKey = apiKey.trim() || getMasterKey();
                if (!image) return setError("⚠️ CARREGA UMA IMAGEM PRIMEIRO!");
                
                setLoading(true);
                setError(null);
                setShowResult(false);

                const modelsToTry = await fetchModels(finalKey);
                let success = false;

                const promptTema = tema.trim() 
                    ? `TEMA OBRIGATÓRIO: ${tema}.` 
                    : `Analisa a imagem e cria o meme mais viral e engraçado possível.`;

                for (const modelName of modelsToTry) {
                    if (success) break;
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${finalKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{
                                    parts: [
                                        { text: `CONTEXTO/GÍRIAS: ${idioma}. ${promptTema}
                                                 REGRA: Saída apenas como "Texto Cima | Texto Baixo".` 
                                        },
                                        { inline_data: { mime_type: "image/jpeg", data: imageBase64 } }
                                    ]
                                }],
                                generationConfig: { temperature: 1, maxOutputTokens: 90 }
                            })
                        });

                        const data = await response.json();
                        if (data.candidates?.[0]) {
                            const raw = data.candidates[0].content.parts[0].text;
                            const clean = raw.replace(/\*\*|Top:|Bottom:|Texto Cima:|Texto Baixo:/gi, '');
                            const [top, bottom] = clean.split('|');
                            
                            const t = top?.trim() || '';
                            const b = bottom?.trim() || '';
                            
                            setMemeTexts({ top: t, bottom: b });
                            success = true;
                            setShowResult(true);
                            speak(t, b);
                        }
                    } catch (e) { console.warn(`Falhou ${modelName}`); }
                }

                if (!success) setError("❌ FALHA NA IA. TENTA OUTRA IMAGEM OU VERIFICA A CHAVE.");
                setLoading(false);
            };

            return (
                <div className="max-w-md mx-auto p-4 space-y-6 min-h-screen pb-24 relative">
                    {/* BARRA SUPERIOR COM ENGRENAGEM */}
                    <header className="flex items-center justify-between pt-6 px-2">
                        <div className="w-10"></div>
                        <div className="flex flex-col items-center">
                            <h1 className="text-3xl font-black italic tracking-tighter text-white">MEMEVISION <span className="text-blue-600">PRO</span></h1>
                            <p className="text-[9px] text-zinc-600 font-bold uppercase tracking-[0.3em]">Felix Edition</p>
                        </div>
                        <button 
                            onClick={() => setShowSettings(true)}
                            className="w-10 h-10 flex items-center justify-center bg-zinc-900 rounded-full border border-zinc-800 text-zinc-400 active:scale-90 transition-all"
                        >
                            ⚙️
                        </button>
                    </header>

                    {/* MODAL DE CONFIGURAÇÕES */}
                    {showSettings && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center px-4 bg-black/80 backdrop-blur-md animate-fade">
                            <div className="w-full max-w-xs bg-zinc-900 rounded-[2.5rem] p-8 border border-zinc-800 shadow-2xl space-y-6">
                                <div className="text-center">
                                    <h2 className="text-xl font-black uppercase italic text-blue-500">Configurações</h2>
                                    <p className="text-[10px] text-zinc-500 uppercase font-bold tracking-widest mt-1">Personaliza o teu motor</p>
                                </div>
                                
                                <div className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black uppercase text-zinc-500 ml-2 tracking-tighter">Chave API Personalizada</label>
                                        <input 
                                            type="password" 
                                            placeholder="Usar chave padrão" 
                                            className="w-full bg-zinc-950 p-4 rounded-2xl text-xs border border-zinc-800 focus:border-blue-600 outline-none transition-all text-blue-400 shadow-inner"
                                            value={apiKey}
                                            onChange={e => setApiKey(e.target.value)}
                                        />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black uppercase text-zinc-500 ml-2 tracking-tighter">Dialeto / Gírias</label>
                                        <input 
                                            placeholder="Ex: Carioca, Tuga, Gamer" 
                                            className="w-full bg-zinc-950 p-4 rounded-2xl text-xs outline-none border border-zinc-800 focus:border-blue-600 transition-all shadow-inner" 
                                            value={idioma} 
                                            onChange={e => setIdioma(e.target.value)} 
                                        />
                                    </div>
                                </div>

                                <button 
                                    onClick={() => setShowSettings(false)}
                                    className="w-full py-4 bg-blue-600 text-white font-black rounded-2xl active:scale-95 transition-all uppercase text-xs shadow-lg shadow-blue-600/20"
                                >
                                    Guardar e Fechar
                                </button>
                            </div>
                        </div>
                    )}

                    <main className="bg-zinc-900/40 p-6 rounded-[2.5rem] border border-zinc-800/50 space-y-5 shadow-2xl neon-border animate-fade">
                        <div className="space-y-3">
                            <input 
                                placeholder="Tema do Meme (Opcional)" 
                                className="w-full bg-zinc-950/80 p-4 rounded-2xl text-sm outline-none border border-zinc-800 focus:border-blue-600 transition-all shadow-inner" 
                                value={tema} 
                                onChange={e => setTema(e.target.value)} 
                            />
                        </div>

                        {!image ? (
                            <label className="flex flex-col items-center justify-center h-52 border-2 border-dashed border-zinc-800 rounded-[2.2rem] cursor-pointer hover:bg-blue-600/5 transition-all active:scale-95 group">
                                <div className="w-14 h-14 bg-zinc-800 rounded-full flex items-center justify-center text-3xl group-hover:bg-blue-600 transition-colors shadow-lg">🖼️</div>
                                <span className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mt-4">Escolher Fotografia</span>
                                <input type="file" className="hidden" accept="image/*" onChange={(e) => {
                                    const file = e.target.files[0];
                                    if(file){
                                        const r = new FileReader();
                                        r.onload = (ev) => { setImage(ev.target.result); setImageBase64(ev.target.result.split(',')[1]); setShowResult(false); };
                                        r.readAsDataURL(file);
                                    }
                                }} />
                            </label>
                        ) : (
                            <div className="relative group animate-fade">
                                <img src={image} className="w-full h-52 object-cover rounded-[2.2rem] border border-zinc-700/50" />
                                <button onClick={() => setImage(null)} className="absolute -top-2 -right-2 bg-red-600 w-10 h-10 rounded-full text-white shadow-xl flex items-center justify-center font-bold border-4 border-zinc-900">✕</button>
                            </div>
                        )}

                        <div className="flex items-center justify-between p-4 bg-zinc-950/50 rounded-2xl border border-zinc-800/50">
                            <span className="text-[10px] font-black uppercase text-zinc-500 italic">Modo Legenda</span>
                            <button onClick={() => setIsUnobstructed(!isUnobstructed)} className={`w-12 h-6 rounded-full relative transition-all ${isUnobstructed ? 'bg-blue-600 shadow-[0_0_10px_rgba(37,99,235,0.4)]' : 'bg-zinc-800'}`}>
                                <div className={`w-4 h-4 bg-white rounded-full absolute top-1 transition-all ${isUnobstructed ? 'left-7' : 'left-1'}`} />
                            </button>
                        </div>

                        <button 
                            onClick={gerarMeme}
                            disabled={loading}
                            className={`w-full py-5 rounded-[2rem] font-black uppercase italic shadow-2xl transition-all active:scale-95 flex items-center justify-center gap-3
                                ${loading ? 'bg-zinc-800 text-zinc-500 cursor-wait' : 'bg-blue-600 text-white shadow-blue-600/20 hover:bg-blue-500'}`}
                        >
                            {loading ? (
                                <><div className="w-4 h-4 border-2 border-zinc-600 border-t-white rounded-full animate-spin"></div> A CRIAR PIADA...</>
                            ) : "GERAR MEME AGORA"}
                        </button>
                    </main>

                    {error && <div className="bg-red-600/10 border border-red-600/30 p-4 rounded-2xl text-[10px] font-bold text-red-500 text-center uppercase tracking-widest animate-pulse mx-4">{error}</div>}

                    {showResult && (
                        <div ref={resultRef} className="meme-container space-y-4 animate-fade">
                            <div ref={memeRef} className="bg-black rounded-[2.8rem] overflow-hidden border-[6px] border-zinc-900 shadow-2xl flex flex-col items-center">
                                {isUnobstructed && <div className="w-full py-7 px-8 text-center font-impact text-2xl uppercase leading-tight text-white tracking-wider">{memeTexts.top}</div>}
                                <div className="relative w-full">
                                    <img src={image} className="w-full h-auto" />
                                    {!isUnobstructed && (
                                        <>
                                            <div className="absolute top-6 w-full px-6 text-center font-impact text-3xl uppercase text-white [text-shadow:4px_4px_0_#000,-4px_-4px_0_#000,4px_-4px_0_#000,-4px_4px_0_#000] leading-none">{memeTexts.top}</div>
                                            <div className="absolute bottom-8 w-full px-6 text-center font-impact text-3xl uppercase text-white [text-shadow:4px_4px_0_#000,-4px_-4px_0_#000,4px_-4px_0_#000,-4px_4px_0_#000] leading-none">{memeTexts.bottom}</div>
                                        </>
                                    )}
                                </div>
                                {isUnobstructed && <div className="w-full py-7 px-8 text-center font-impact text-2xl uppercase leading-tight text-white tracking-wider">{memeTexts.bottom}</div>}
                            </div>
                            
                            <div className="grid grid-cols-2 gap-3 pb-8">
                                <button onClick={() => speak(memeTexts.top, memeTexts.bottom)} className="bg-zinc-900 p-5 rounded-[2rem] font-black text-[10px] uppercase border border-zinc-800 active:bg-zinc-800 transition-all flex items-center justify-center gap-2">
                                    <span className="text-xl">🔊</span> OUVIR
                                </button>
                                <button onClick={downloadMeme} className="bg-zinc-100 text-black p-5 rounded-[2rem] font-black text-[10px] uppercase active:scale-95 transition-all flex items-center justify-center gap-2 shadow-xl">
                                    <span className="text-xl">💾</span> BAIXAR
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
