<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeVision IA</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <h1>🎭 MemeVision IA</h1>
        <input type="text" id="customTheme" placeholder="Tema do meme...">
        <input type="text" id="customLang" value="Português">
        
        <div class="theme-selector">
            <button class="theme-btn active" onclick="setTheme(this, 'engraçado')">😂 Rir</button>
            <button class="theme-btn" onclick="setTheme(this, 'sarcástico')">🙄 Sarcasmo</button>
        </div>

        <div id="uploadArea" class="upload-box" onclick="document.getElementById('fileInput').click()">
            <p>📸 TOQUE PARA FOTO</p>
            <input type="file" id="fileInput" style="display:none" onchange="gerarMemeIA(this.files[0])">
        </div>

        <div id="loadingArea" style="display:none">IA Pensando...</div>

        <div id="resultArea" style="display:none">
            <div id="memeExport" class="meme-container">
                <img id="uploadedImage">
                <div id="topText" class="meme-text"></div>
                <div id="bottomText" class="meme-text"></div>
            </div>
            <button id="downloadBtn" onclick="baixarMeme()">💾 Baixar</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
